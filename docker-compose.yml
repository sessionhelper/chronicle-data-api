# ovp-data-api — dev stack
#
# Deployed to dev VPS (REDACTED) under /opt/ovp/.
# .env lives alongside this file (chmod 600, not committed).
#
# Prod-like shape so the same compose can eventually add ovp-worker,
# ttrpg-collector, and any other siblings to the same network.

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ovp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ovp_data_api
    volumes:
      - ovp-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ovp -d ovp_data_api"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ovp

  data-api:
    image: ghcr.io/sessionhelper/ovp-data-api:dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://ovp:${POSTGRES_PASSWORD}@postgres:5432/ovp_data_api
      BIND_ADDR: 0.0.0.0:8001
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      SHARED_SECRET: ${SHARED_SECRET}
      RUST_LOG: ovp_data_api=info,tower_http=info
    # Bind to loopback on the host so only SSH tunnels (or sibling
    # containers on the ovp network) can reach it.
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - ovp

volumes:
  ovp-postgres:

networks:
  ovp:
    name: ovp
